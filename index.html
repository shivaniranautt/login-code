<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Nature Login</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background:
            linear-gradient(rgba(15,23,42,0.55), rgba(15,23,42,0.55)),
            url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')
            no-repeat center center/cover;
    }

    .login-box {
        width: 350px;
        padding: 40px;
        background: rgba(255,255,255,0.15);
        border-radius: 20px;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        text-align: center;
        color: #fff;
    }

    .login-box h2 {
        margin-bottom: 30px;
        font-weight: 600;
        letter-spacing: 1px;
    }

    .inputBox {
        position: relative;
        margin-bottom: 20px;
    }

    .inputBox input {
        width: 100%;
        padding: 12px 15px;
        border: none;
        outline: none;
        border-radius: 10px;
        background: rgba(255,255,255,0.25);
        color: #fff;
        font-size: 14px;
    }

    .inputBox input::placeholder {
        color: #eee;
    }

    .inputBox input[type="submit"] {
        background: #ff7b00;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
    }

    .inputBox input[type="submit"]:hover {
        background: #ff9500;
        transform: scale(1.05);
    }

    .show-pass {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #fff;
        font-size: 12px;
        user-select: none;
    }

    .remember-me {
        display: flex;
        align-items: center;
        font-size: 14px;
        margin-bottom: 15px;
    }

    .remember-me input {
        margin-right: 8px;
    }

    .group {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-top: 10px;
    }

    .group a {
        color: #fff;
        text-decoration: none;
        transition: 0.3s;
    }

    .group a:hover {
        text-decoration: underline;
        color: #ffddaa;
    }

    /* Glassmorphic Google Button */
    .google-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border-radius: 10px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        backdrop-filter: blur(15px);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
        box-shadow: 0 4px 30px rgba(0,0,0,0.2);
    }

    .google-btn img {
        transition: 0.3s;
        filter: brightness(0) invert(1); /* White logo on glass background */
    }

    .google-btn:hover {
        background: rgba(255,255,255,0.25);
        transform: scale(1.05);
        box-shadow: 0 6px 40px rgba(0,0,0,0.3);
    }

    .google-btn:hover img {
        filter: brightness(0) invert(0); /* Colored logo on hover */
    }
</style>
</head>
<body>

<div class="login-box">
    <h2>Sign In</h2>

    <div class="inputBox">
        <input type="text" placeholder="Username" required>
    </div>

    <div class="inputBox">
        <input type="password" id="password" placeholder="Password" required>
        <span class="show-pass" onclick="togglePassword()">Show</span>
    </div>

    <div class="remember-me">
        <input type="checkbox" id="remember">
        <label for="remember">Remember Me</label>
    </div>

    <div class="inputBox">
        <input type="submit" value="Login">
    </div>

  

    <div class="group">
        <a href="#">Forget Password</a>
        <a href="#">Signup</a>
    </div>
</div>

<script>
function togglePassword() {
    const passField = document.getElementById('password');
    const toggle = document.querySelector('.show-pass');
    if(passField.type === 'password'){
        passField.type = 'text';
        toggle.textContent = 'Hide';
    } else {
        passField.type = 'password';
        toggle.textContent = 'Show';
    }
}
</script>

</body>
</html>
